<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Transport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h2 class="card-title text-center">Edit Vehicle</h2>
                <form action="/edit_transport/{{ vehicle.vehicle_id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Vehicle Type</label>
                        <input type="text" name="type" class="form-control" value="{{ vehicle.type }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Plate Number</label>
                        <input type="text" name="plate" class="form-control" value="{{ vehicle.plate_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Driver Name</label>
                        <input type="text" name="driver" class="form-control" value="{{ vehicle.driver_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Capacity</label>
                        <input type="number" name="capacity" class="form-control" value="{{ vehicle.capacity }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Route Info</label>
                        <input type="text" name="route" class="form-control" value="{{ vehicle.route_info }}">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Update Vehicle</button>
                    <a href="/transport" class="btn btn-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
