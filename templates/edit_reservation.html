<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% include '_alerts.html' %}
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 800px;">
            <div class="card-body">
                <h2 class="card-title text-center">Edit Reservation</h2>
                <form action="/edit_reservation/{{ res.reservation_id }}" method="POST" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Customer</label>
                        <select name="customer_id" class="form-select" required>
                            {% for customer in customers %}
                            <option value="{{ customer.customer_id }}" {% if customer.customer_id == res.customer_id %}selected{% endif %}>
                                {{ customer.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Package Tour</label>
                        <select name="package_id" class="form-select" required>
                            {% for tour in tours %}
                            <option value="{{ tour.package_id }}" {% if tour.package_id == res.package_id %}selected{% endif %}>
                                {{ tour.title }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Assign Guide</label>
                        <select name="guide_id" class="form-select">
                            <option value="">None</option>
                            {% for guide in guides %}
                            <option value="{{ guide.guide_id }}" {% if guide.guide_id == res.guide_id %}selected{% endif %}>
                                {{ guide.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Assign Transport</label>
                        <select name="vehicle_id" class="form-select">
                            <option value="">None</option>
                            {% for v in transport %}
                            <option value="{{ v.vehicle_id }}" {% if v.vehicle_id == res.vehicle_id %}selected{% endif %}>
                                {{ v.type }} ({{ v.plate_number }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Booking Channel</label>
                        <select name="booking_channel" class="form-select">
                            <option value="Website" {% if res.booking_channel == 'Website' %}selected{% endif %}>Website</option>
                            <option value="Mobile App" {% if res.booking_channel == 'Mobile App' %}selected{% endif %}>Mobile App</option>
                            <option value="Phone Call" {% if res.booking_channel == 'Phone Call' %}selected{% endif %}>Phone Call</option>
                            <option value="Walk-in" {% if res.booking_channel == 'Walk-in' %}selected{% endif %}>Walk-in</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Assignment Date</label>
                        <input type="date" name="assignment_date" class="form-control" value="{{ res.assignment_date }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <input type="text" name="status" class="form-control" value="{{ res.reservation_status }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">People</label>
                        <input type="number" name="people" class="form-control" value="{{ res.number_of_people }}">
                    </div>
                    <div class="col-md-9">
                        <label class="form-label">Special Requests</label>
                        <input type="text" name="special_request" class="form-control" value="{{ res.special_request }}">
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success w-100">Update Reservation</button>
                        <a href="/reservations" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
