<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% include '_alerts.html' %}
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h2 class="card-title text-center">Edit Payment</h2>
                <form action="/edit_payment/{{ payment.payment_id }}" method="POST" class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label">Reservation</label>
                        <select name="reservation_id" class="form-select" required>
                            {% for res in reservations %}
                            <option value="{{ res.reservation_id }}" {% if res.reservation_id == payment.reservation_id %}selected{% endif %}>
                                #{{ res.reservation_id }} - {{ res.customer_name }} ({{ res.tour_title }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Transaction ID</label>
                        <input type="text" name="transaction_id" class="form-control" value="{{ payment.transaction_id }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Amount</label>
                        <input type="number" step="0.01" name="amount" class="form-control" value="{{ payment.amount }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Currency</label>
                        <input type="text" name="currency" class="form-control" value="{{ payment.currency }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Payment Method</label>
                        <select name="method" class="form-select">
                            <option value="Credit Card" {% if payment.payment_method == 'Credit Card' %}selected{% endif %}>Credit Card</option>
                            <option value="Cash" {% if payment.payment_method == 'Cash' %}selected{% endif %}>Cash</option>
                            <option value="Bank Transfer" {% if payment.payment_method == 'Bank Transfer' %}selected{% endif %}>Bank Transfer</option>
                            <option value="PayPal" {% if payment.payment_method == 'PayPal' %}selected{% endif %}>PayPal</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <input type="text" name="status" class="form-control" value="{{ payment.status }}">
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success w-100">Update Payment</button>
                        <a href="/payments" class="btn btn-secondary w-100 mt-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
